appId: com.claude.avatars
productName: Claude Avatars
artifactName: Claude-Avatars-latest-${arch}.${ext}
directories:
  output: release
  buildResources: assets

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  icon: assets/tray-icon.png
  darkModeSupport: true

dmg:
  title: Claude Avatars
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

files:
  - dist/**/*
  - assets/**/*
  - "!src/**/*"
  - "!docs/**/*"
  - "!**/*.ts"
  - "!tsconfig.json"
